name: Build and Push to Docker Hub

on:
push:
branches: [ "main" ]

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout your repository code
  - name: Checkout code
    uses: actions/checkout@v4

  # 2. Set up Docker Buildx (advanced builder)
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  # 3. Log in to Docker Hub using GitHub Secrets
  - name: Log in to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  # 4. Build and push Docker image
  - name: Build and push Docker image
    uses: docker/build-push-action@v5
    with:
      context: .
      file: ./Dockerfile   # Make sure your file is named exactly "Dockerfile"
      push: true
      tags: YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME:latest
```
